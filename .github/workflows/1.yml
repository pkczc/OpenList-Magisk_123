name: 构建 OpenList Magisk 模块

on:
  schedule:
    - cron: '0 */4 * * *'  # 每4小时运行一次
  workflow_dispatch:      # 支持手动触发
  push:
    branches:
      - main              # 推送 main 分支时触发

permissions:
  contents: write         # 允许推送代码和创建 Release
  actions: read           # 允许读取 Actions 状态

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 检出仓库代码
      - name: 检出仓库代码
        uses: actions/checkout@v4

      # 安装依赖工具
      - name: 安装依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y curl zip jq gh

      # 获取 OpenList 最新版本
      - name: 获取 OpenList 最新版本
        id: get_version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          API_URL: https://api.github.com/repos/Yxiguan/OpenList_123/releases/latest
        run: |
          RESPONSE_JSON=$(curl -s -L -H "Authorization: Bearer $GITHUB_TOKEN" "$API_URL")

          if [ -z "$RESPONSE_JSON" ] || [ "$(echo "$RESPONSE_JSON" | jq '.message')" != "null" ]; then
            echo "::error::无法获取 OpenList Release 数据。"
            echo "API 响应: $RESPONSE_JSON"
            exit 1
          fi

          VERSION=$(echo "$RESPONSE_JSON" | jq -r '.tag_name')
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "::error::无法从 API 响应中提取版本号 (tag_name)"
            exit 1
          fi

          VERSION_CODE=$(echo "$VERSION" | tr -d 'v.')
          CHANGELOG=$(echo "$RESPONSE_JSON" | jq -r '.body')
          ARM_URL=$(echo "$RESPONSE_JSON" | jq -r '.assets[] | select(.name | contains("openlist-android-arm.tar.gz")) | .browser_download_url')
          ARM64_URL=$(echo "$RESPONSE_JSON" | jq -r '.assets[] | select(.name | contains("openlist-android-arm64.tar.gz")) | .browser_download_url')

          if [ -z "$ARM_URL" ] || [ -z "$ARM64_URL" ]; then
            echo "::error::无法提取二进制下载链接。请检查上游 Release 的附件文件名是否正确。"
            exit 1
          fi

          echo "OPENLIST_VERSION=$VERSION" >> $GITHUB_ENV
          echo "OPENLIST_VERSION_CODE=$VERSION_CODE" >> $GITHUB_ENV
          echo "OPENLIST_ARM_URL=$ARM_URL" >> $GITHUB_ENV
          echo "OPENLIST_ARM64_URL=$ARM64_URL" >> $GITHUB_ENV
          {
            echo 'OPENLIST_CHANGELOG<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> "$GITHUB_ENV"

      # 检查当前模块版本
      - name: 检查当前模块版本
        id: check_version
        run: |
          if [ -f update.json ]; then
            CURRENT_VERSION=$(jq -r '.version' update.json)
            echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV
          else
            echo "CURRENT_VERSION=none" >> $GITHUB_ENV
          fi

      # 比较版本并决定是否构建
      - name: 检查是否需要构建
        id: should_build
        run: |
          if [ "${{ env.CURRENT_VERSION }}" = "none" ] || [ "${{ env.OPENLIST_VERSION }}" != "${{ env.CURRENT_VERSION }}" ]; then
            echo "需要构建新模块：OpenList 版本 ${{ env.OPENLIST_VERSION }}，当前模块版本 ${{ env.CURRENT_VERSION }}"
            echo "SHOULD_BUILD=true" >> $GITHUB_ENV
          else
            echo "模块版本已是最新 (${{ env.OPENLIST_VERSION }})，无需构建"
            echo "SHOULD_BUILD=false" >> $GITHUB_ENV
          fi

      # 同步 OpenList 二进制文件
      - name: 同步 OpenList 二进制文件
        if: env.SHOULD_BUILD == 'true'
        run: |
          mkdir -p OpenList-Magisk
          # 下载并解压 ARM 版本
          curl -L -o openlist-arm.tar.gz "${{ env.OPENLIST_ARM_URL }}"
          tar -xzf openlist-arm.tar.gz
          mv openlist OpenList-Magisk/openlist-arm
          rm -f openlist-arm.tar.gz
          # 下载并解压 ARM64 版本
          curl -L -o openlist-arm64.tar.gz "${{ env.OPENLIST_ARM64_URL }}"
          tar -xzf openlist-arm64.tar.gz
          mv openlist OpenList-Magisk/openlist-arm64
          rm -f openlist-arm64.tar.gz
          # 设置权限
          chmod 755 OpenList-Magisk/openlist-arm OpenList-Magisk/openlist-arm64

      # 更新配置文件
      - name: 更新配置文件
        if: env.SHOULD_BUILD == 'true'
        run: |
          # 更新 update.json
          cat > update.json << EOF
          {
              "version": "${{ env.OPENLIST_VERSION }}",
              "versionCode": ${{ env.OPENLIST_VERSION_CODE }},
              "zipUrl": "${{ github.server_url }}/${{ github.repository }}/releases/download/${{ env.OPENLIST_VERSION }}/openlist-magisk-${{ env.OPENLIST_VERSION }}.zip",
              "changelog": "https://raw.githubusercontent.com/${{ github.repository }}/main/CHANGELOG.md"
          }
          EOF

          # 更新 module.prop
          if [ -f OpenList-Magisk/module.prop ]; then
            sed -i "s/^version=.*/version=${{ env.OPENLIST_VERSION }}/" OpenList-Magisk/module.prop
            sed -i "s/^versionCode=.*/versionCode=${{ env.OPENLIST_VERSION_CODE }}/" OpenList-Magisk/module.prop
          else
            echo "::error::module.prop 文件不存在"
            exit 1
          fi
          
          # 创建 CHANGELOG.md
          echo -e "${{ env.OPENLIST_CHANGELOG }}" > CHANGELOG.md

          # 提交更改
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add update.json OpenList-Magisk/module.prop CHANGELOG.md
          git commit -m "feat: 更新模块到 OpenList ${{ env.OPENLIST_VERSION }}" || echo "无更改需要提交"
          git push origin main

      # 打包模块
      - name: 打包模块
        if: env.SHOULD_BUILD == 'true'
        run: |
          cd OpenList-Magisk
          zip -r9 ../openlist-magisk-${{ env.OPENLIST_VERSION }}.zip .
          cd ..

      # 创建 Release
      - name: 创建 Release
        if: env.SHOULD_BUILD == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ env.OPENLIST_VERSION }}" \
            --title "OpenList Magisk Module ${{ env.OPENLIST_VERSION }}" \
            --notes-file CHANGELOG.md \
            --draft=false \
            --prerelease=false \
            "openlist-magisk-${{ env.OPENLIST_VERSION }}.zip"

      # 清理临时文件
      - name: 清理临时文件
        if: always()
        run: |
          rm -f openlist-magisk-*.zip CHANGELOG.md